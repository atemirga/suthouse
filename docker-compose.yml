version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: suthouse-db
    environment:
      POSTGRES_USER: suthouse
      POSTGRES_PASSWORD: ${DB_PASSWORD:-suthouse_local_pwd}
      POSTGRES_DB: suthouse_finance
      TZ: Asia/Almaty
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suthouse -d suthouse_finance"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: cron
    container_name: suthouse-migrate
    environment:
      DATABASE_URL: postgresql://suthouse:${DB_PASSWORD:-suthouse_local_pwd}@db:5432/suthouse_finance?schema=public
    depends_on:
      db:
        condition: service_healthy
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"

  app:
    build:
      context: .
      target: runner
    container_name: suthouse-app
    environment:
      DATABASE_URL: postgresql://suthouse:${DB_PASSWORD:-suthouse_local_pwd}@db:5432/suthouse_finance?schema=public
      ODATA_URL: ${ODATA_URL:-https://185-35-223-42.sslip.io/house/odata/standard.odata}
      ODATA_LOGIN: ${ODATA_LOGIN:-odata.user}
      ODATA_PASSWORD: ${ODATA_PASSWORD:-House2025}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      TIMEZONE: Asia/Almaty
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  cron:
    build:
      context: .
      target: cron
    container_name: suthouse-cron
    environment:
      DATABASE_URL: postgresql://suthouse:${DB_PASSWORD:-suthouse_local_pwd}@db:5432/suthouse_finance?schema=public
      ODATA_URL: ${ODATA_URL:-https://185-35-223-42.sslip.io/house/odata/standard.odata}
      ODATA_LOGIN: ${ODATA_LOGIN:-odata.user}
      ODATA_PASSWORD: ${ODATA_PASSWORD:-House2025}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      SYNC_INTERVAL_MINUTES: "${SYNC_INTERVAL_MINUTES:-15}"
      SYNC_DAYS_BACK: "${SYNC_DAYS_BACK:-60}"
      TIMEZONE: Asia/Almaty
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
